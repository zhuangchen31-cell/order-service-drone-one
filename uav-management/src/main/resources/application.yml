spring:
  main:
    web-application-type: servlet
  # 数据源配置
  datasource:
    # 数据库类型：sqlite或mysql
    type: com.alibaba.druid.pool.DruidDataSource
    # SQLite配置
    url: jdbc:sqlite:data/uav.db
    driver-class-name: org.sqlite.JDBC
    # MySQL配置（注释掉的部分）
    # url: jdbc:mysql://localhost:3306/uav_db?useUnicode=true&characterEncoding=utf8&useSSL=false
    # username: root
    # password: root
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # Druid连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
  # 禁用 DevTools 自动重启
  devtools:
    restart:
      enabled: false

  # Thymeleaf配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML5
    encoding: UTF-8
    cache: false

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.uav.management.entity

# 日志配置
logging:
  level:
    root: info
    com.uav.management: info
    org.apache.shiro: info
    org.springframework: info
    org.mybatis: info

# 服务器配置
server:
  port: 8090
  servlet:
    context-path: /

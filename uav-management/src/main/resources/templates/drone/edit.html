<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑无人机 - 无人机信息管理系统</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
    <style>
        .container {
            margin-top: 20px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .form-container {
            background-color: #f8f8f8;
            padding: 30px;
            border-radius: 5px;
        }
        .error-message {
            color: #d9534f;
            margin-top: 10px;
        }
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23333' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 16px;
            padding-right: 2.5rem;
        }
        .data-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .data-row label {
            min-width: 120px;
            font-weight: normal;
            margin-bottom: 0;
        }
        .data-row .data-input {
            flex: 1;
        }
        .data-row .unit {
            color: #666;
            font-size: 12px;
            min-width: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>无人机信息管理 <small>编辑无人机</small></h1>
        </div>

        <div class="form-container">
            <form action="/drone/edit" method="post" class="form-horizontal">
                <input type="hidden" name="id" th:value="${drone.id}">
                <div class="form-group">
                    <label for="model" class="col-sm-2 control-label">无人机型号</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="model" name="model" th:value="${drone.model}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="serialNumber" class="col-sm-2 control-label">序列号</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="serialNumber" name="serialNumber" th:value="${drone.serialNumber}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="manufacturer" class="col-sm-2 control-label">制造商</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="manufacturer" name="manufacturer" th:value="${drone.manufacturer}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="purchaseDate" class="col-sm-2 control-label">购买日期</label>
                    <div class="col-sm-10">
                        <input type="date" class="form-control" id="purchaseDate" name="purchaseDate" th:value="${#dates.format(drone.purchaseDate, 'yyyy-MM-dd')}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="status" class="col-sm-2 control-label">状态</label>
                    <div class="col-sm-10">
                        <select class="form-control" id="status" name="status" required>
                            <option value="IN_USE" th:selected="${drone.status == 'IN_USE'}">在用</option>
                            <option value="MAINTENANCE" th:selected="${drone.status == 'MAINTENANCE'}">维修</option>
                            <option value="RETIRED" th:selected="${drone.status == 'RETIRED'}">报废</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">无人机基本数据</label>
                    <div class="col-sm-10">
                        <input type="hidden" id="aiProperties" name="aiProperties" th:value="${drone.aiProperties}">
                        <div class="data-row">
                            <label>机身重量</label>
                            <input type="text" class="form-control data-input" data-key="机身重量" value="">
                            <span class="unit">kg</span>
                        </div>
                        <div class="data-row">
                            <label>最大飞行时间</label>
                            <input type="text" class="form-control data-input" data-key="最大飞行时间" value="">
                            <span class="unit">分钟</span>
                        </div>
                        <div class="data-row">
                            <label>最大飞行速度</label>
                            <input type="text" class="form-control data-input" data-key="最大飞行速度" value="">
                            <span class="unit">km/h</span>
                        </div>
                        <div class="data-row">
                            <label>最大飞行高度</label>
                            <input type="text" class="form-control data-input" data-key="最大飞行高度" value="">
                            <span class="unit">米</span>
                        </div>
                        <div class="data-row">
                            <label>摄像头分辨率</label>
                            <input type="text" class="form-control data-input" data-key="摄像头分辨率" value="">
                            <span class="unit"></span>
                        </div>
                        <div class="data-row">
                            <label>电池容量</label>
                            <input type="text" class="form-control data-input" data-key="电池容量" value="">
                            <span class="unit">mAh</span>
                        </div>
                        <div class="data-row">
                            <label>GPS定位精度</label>
                            <input type="text" class="form-control data-input" data-key="GPS定位精度" value="">
                            <span class="unit">米</span>
                        </div>
                        <div class="data-row">
                            <label>翼展宽度</label>
                            <input type="text" class="form-control data-input" data-key="翼展宽度" value="">
                            <span class="unit">cm</span>
                        </div>
                        <div class="data-row">
                            <label>机身长度</label>
                            <input type="text" class="form-control data-input" data-key="机身长度" value="">
                            <span class="unit">cm</span>
                        </div>
                        <div class="data-row">
                            <label>巡航速度</label>
                            <input type="text" class="form-control data-input" data-key="巡航速度" value="">
                            <span class="unit">km/h</span>
                        </div>
                        <div class="data-row">
                            <label>有效载荷</label>
                            <input type="text" class="form-control data-input" data-key="有效载荷" value="">
                            <span class="unit">g</span>
                        </div>
                        <div class="data-row">
                            <label>通信距离</label>
                            <input type="text" class="form-control data-input" data-key="通信距离" value="">
                            <span class="unit">km</span>
                        </div>
                        <div class="data-row">
                            <label>抗风等级</label>
                            <input type="text" class="form-control data-input" data-key="抗风等级" value="">
                            <span class="unit">级</span>
                        </div>
                        <div class="data-row">
                            <label>工作温度</label>
                            <input type="text" class="form-control data-input" data-key="工作温度" value="">
                            <span class="unit"></span>
                        </div>
                        <div class="data-row">
                            <label>数据传输速率</label>
                            <input type="text" class="form-control data-input" data-key="数据传输速率" value="">
                            <span class="unit">Mbps</span>
                        </div>
                        <p class="help-block">无人机基本数据可以手动修改</p>
                    </div>
                </div>
                <div class="form-group">
                    <div class="col-sm-offset-2 col-sm-10">
                        <button type="submit" class="btn btn-primary">提交</button>
                        <a href="/drone/list" class="btn btn-default">返回主页</a>
                    </div>
                </div>
                <div class="error-message" th:if="${error}" th:text="${error}"></div>
            </form>
        </div>
    </div>

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
    <script>
        $(document).ready(function() {
            // 从隐藏字段解析JSON并填充到各个输入框
            var aiPropertiesJson = $('#aiProperties').val();
            if (aiPropertiesJson) {
                try {
                    var properties = JSON.parse(aiPropertiesJson);
                    $('.data-input').each(function() {
                        var key = $(this).data('key');
                        if (properties[key] !== undefined) {
                            $(this).val(properties[key]);
                        }
                    });
                } catch (e) {
                    console.log('解析无人机基本数据失败:', e);
                }
            }

            // 表单提交时，将数据同步到隐藏字段
            $('form').on('submit', function() {
                var properties = {};
                $('.data-input').each(function() {
                    var key = $(this).data('key');
                    var value = $(this).val();
                    if (value) {
                        properties[key] = value;
                    }
                });
                $('#aiProperties').val(JSON.stringify(properties));
            });
        });
    </script>
</body>
</html>

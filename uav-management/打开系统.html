<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=http://localhost:27543/drone/list">
    <title>跳转到无人机管理系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>正在跳转到无人机管理系统...</h1>
        <div class="spinner"></div>
        <p>如果没有自动跳转，请点击：<a href="http://localhost:27543/drone/list">这里</a></p>
        <p style="font-size: 14px; margin-top: 30px;">
            提示：请确保应用程序已经启动<br>
            如未启动，请先运行 "启动应用.bat"
        </p>
    </div>
</body>
</html>
